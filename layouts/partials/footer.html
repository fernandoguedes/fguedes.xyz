<footer class="site-footer">
  <p class="footer-colophon">
    {{ site.Title }} escreve sobre engenharia de software, liderança, viagens e cultura.
    Feito com <a href="https://gohugo.io/" rel="noopener" target="_blank">Hugo</a> e publicado em {{ now.Year }}.
    {{ with site.Params.github }}<a href="https://github.com/{{ . }}" rel="me noopener" target="_blank">GitHub</a>.{{ end }}
    {{ with site.Params.linkedin }}<a href="https://linkedin.com/in/{{ . }}" rel="me noopener" target="_blank">LinkedIn</a>.{{ end }}
    {{ if site.Params.rss }}<a href="{{ `index.xml` | absURL }}" rel="alternate">RSS</a>.{{ end }}
  </p>
  <p class="footer-mark">© {{ now.Year }} {{ site.Title }}</p>
</footer>
